<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài Kiểm Tra - Tasks List</title>
    <link rel="stylesheet" href="bootstrap-5.3.8-dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-light">

    <!-- Thẻ root để hiển thị giao diện React -->
    <div id="root"></div>

    <!-- Nhúng các file thư viện React và Babel chạy offline -->
    <script src="js/react.development.js"></script>
    <script src="js/react-dom.development.js"></script>
    <script src="js/babel.min.js"></script>

    <!-- Mã nguồn ReactJS -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            // C3: Khai báo các State cơ bản để lưu dữ liệu
            const [tasks, setTasks] = useState([]); // Danh sách công việc
            const [showForm, setShowForm] = useState(false); // Trạng thái ẩn/hiện form
            
            // Các state phục vụ cho Form nhập liệu
            const [title, setTitle] = useState(""); // Lưu tên công việc nhập vào
            const [priority, setPriority] = useState("Low"); // Lưu mức độ ưu tiên chọn trong Form (Mặc định Low)
            const [editingId, setEditingId] = useState(null); // Lưu ID của công việc đang sửa
            
            // Các state hiển thị thông báo phản hồi (C2)
            const [error, setError] = useState(""); // Thông báo lỗi
            const [success, setSuccess] = useState(""); // Thông báo thành công

            // C3: Truy vấn và lưu trữ dữ liệu một cách động từ tệp data.json  
            useEffect(() => {
                fetch("data.json")
                    .then(res => res.json())
                    .then(data => {
                        setTasks(data); // Lưu dữ liệu vào state
                    })
                    .catch(err => {
                        // Nếu bị lỗi CORS
                        const duLieuMau = [
                            { "id": 1, "title": "Go to gym", "priority": "High", "status": "To Do" },
                            { "id": 2, "title": "Read a book", "priority": "Low", "status": "Done" },
                            { "id": 3, "title": "Go to market", "priority": "Medium", "status": "In Progress" },
                        ];
                        setTasks(duLieuMau);
                    });
            }, []);

            // Lưu danh sách công việc vào trình duyệt 
            useEffect(() => {
                const duLieuDaLuu = localStorage.getItem("tasks_local");
                if (duLieuDaLuu) {
                    setTasks(JSON.parse(duLieuDaLuu));
                }
            }, []);

            const luuCongViec = (updatedList) => {
                setTasks(updatedList);
                localStorage.setItem("tasks_local", JSON.stringify(updatedList));
            };

            // Thêm mới / Cập nhật công việc
            const handleSubmit = (e) => {
                e.preventDefault();

                // C2: Kiểm tra dữ liệu đầu vào 
                if (title.trim() === "") {
                    setError("Lỗi: Tên công việc không được để trống!");
                    setSuccess("");
                    return;
                }
                if (title.trim().length > 100) {
                    setError("Lỗi: Tên công việc không được vượt quá 100 kí tự!");
                    setSuccess("");
                    return;
                }

                // Nếu hợp lệ, xóa lỗi cũ đi
                setError("");

                if (editingId !== null) {
                    // Xử lý sửa công việc
                    const dataMoi = tasks.map(item => {
                        if (item.id === editingId) {
                            return { ...item, title: title.trim(), priority: priority };
                        }
                        return item;
                    });
                    luuCongViec(dataMoi);
                    setSuccess("Cập nhật công việc thành công!");
                    setEditingId(null);
                } else {
                    // C3: Thêm mới công việc
                    const taskMoi = {
                        id: Date.now(), // tạo ID ngẫu nhiên bằng thời gian hiện tại
                        title: title.trim(),
                        priority: priority,
                        status: "To Do" // Mặc định khi thêm mới là To Do
                    };
                    luuCongViec([...tasks, taskMoi]);
                    setSuccess("Thêm công việc thành công!");
                }

                // Reset lại ô nhập về mặc định
                setTitle("");
                setPriority("Low");

                // Đóng Form sau 1 giây
                setTimeout(() => {
                    setSuccess("");
                    setShowForm(false);
                }, 1000);
            };

            // Hàm xóa công việc
            const handleDelete = (id) => {
                if (confirm("Bạn có muốn xóa công việc này không?")) {
                    const dataConLai = tasks.filter(item => item.id !== id);
                    luuCongViec(dataConLai);
                }
            };

            // Hàm sửa công việc (Đưa dữ liệu cũ lên Form để sửa)
            const handleEdit = (task) => {
                setEditingId(task.id);
                setTitle(task.title);
                setPriority(task.priority);
                setShowForm(true);
                setError("");
                setSuccess("");
            };

            // Hàm đổi trạng thái công việc 
            const handleDoiTrangThai = (task) => {
                let statusMoi = "To Do";
                if (task.status === "To Do") statusMoi = "In Progress";
                else if (task.status === "In Progress") statusMoi = "Done";
                else if (task.status === "Done") statusMoi = "To Do";

                const dataCapNhat = tasks.map(item => {
                    if (item.id === task.id) {
                        return { ...item, status: statusMoi };
                    }
                    return item;
                });
                luuCongViec(dataCapNhat);
            };

            return (
                <div className="container py-5" style={{ maxWidth: "700px" }}>
                    
                    {/* Khung danh sách công việc */}
                    <div className="card p-4 mb-4 shadow-sm task-card-main">
                        <div className="d-flex justify-content-between align-items-center mb-4">
                            <h2 className="fw-bold m-0" style={{ color: "#1e293b" }}>Task List</h2>
                            <button 
                                onClick={() => {
                                    setEditingId(null);
                                    setTitle("");
                                    setPriority("Low");
                                    setError("");
                                    setSuccess("");
                                    setShowForm(true);
                                }} 
                                className="btn btn-add-task"
                            >
                                + Add Task
                            </button>
                        </div>

                        {/* Vùng hiển thị danh sách các Task */}
                        <div id="task-list-container">
                            {tasks.length === 0 ? (
                                <div className="text-center text-muted py-4">Chưa có công việc nào.</div>
                            ) : (
                                tasks.map(item => (
                                    <div key={item.id} className="task-item">
                                        <div className="row align-items-center">
                                            {/* Cột 1: Tên Task */}
                                            <div className="col-12 col-sm-4 mb-2 mb-sm-0">
                                                <small className="text-muted d-block" style={{ fontSize: "11px" }}>Task</small>
                                                <strong style={{ color: "#334155" }}>{item.title}</strong>
                                            </div>
                                            
                                            {/* Cột 2: Mức độ ưu tiên */}
                                            <div className="col-4 col-sm-3">
                                                <small className="text-muted d-block" style={{ fontSize: "11px" }}>Priority</small>
                                                <span className={`fw-bold ${
                                                    item.priority === "High" ? "text-danger" : 
                                                    item.priority === "Medium" ? "text-warning" : "text-success"
                                                }`}>
                                                    {item.priority}
                                                </span>
                                            </div>
                                            
                                            {/* Cột 3: Trạng thái (Badge) */}
                                            <div className="col-4 col-sm-2 text-center text-sm-start">
                                                <span className="badge-status">{item.status}</span>
                                            </div>
                                            
                                            {/* Cột 4: Nút điều khiển */}
                                            <div className="col-4 col-sm-3 text-end d-flex align-items-center justify-content-end gap-3">
                                                {/* Vòng tròn trạng thái (C1) */}
                                                <div 
                                                    onClick={() => handleDoiTrangThai(item)}
                                                    className={
                                                        item.status === "Done" ? "circle-done" : 
                                                        item.status === "In Progress" ? "circle-inprogress" : "circle-todo"
                                                    }
                                                    title="Click để đổi trạng thái"
                                                ></div>

                                                {/* Icon sửa màu xám */}
                                                <svg 
                                                    onClick={() => handleEdit(item)}
                                                    xmlns="http://www.w3.org/2000/svg" 
                                                    width="19" 
                                                    height="19" 
                                                    viewBox="0 0 24 24" 
                                                    fill="none" 
                                                    stroke="currentColor" 
                                                    strokeWidth="2" 
                                                    strokeLinecap="round" 
                                                    strokeLinejoin="round" 
                                                    style={{ color: "#475569", cursor: "pointer" }}
                                                >
                                                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                                                    <path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4z"></path>
                                                </svg>

                                                {/* Icon xóa màu đỏ */}
                                                <svg 
                                                    onClick={() => handleDelete(item.id)}
                                                    xmlns="http://www.w3.org/2000/svg" 
                                                    width="19" 
                                                    height="19" 
                                                    viewBox="0 0 24 24" 
                                                    fill="none" 
                                                    stroke="currentColor" 
                                                    strokeWidth="2" 
                                                    strokeLinecap="round" 
                                                    strokeLinejoin="round" 
                                                    style={{ color: "#ef4444", cursor: "pointer" }}
                                                >
                                                    <polyline points="3 6 5 6 21 6"></polyline>
                                                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                                                    <line x1="10" y1="11" x2="10" y2="17"></line>
                                                    <line x1="14" y1="11" x2="14" y2="17"></line>
                                                </svg>
                                            </div>
                                        </div>
                                    </div>
                                ))
                            )}
                        </div>
                    </div>

                    {/* Thêm/sửa công việc */}
                    {showForm && (
                        <div className="card p-4 form-card">
                            <div className="d-flex justify-content-between align-items-center mb-3">
                                <h4 className="fw-bold m-0" style={{ color: "#1e293b" }}>
                                    {editingId !== null ? "Edit Task" : "Add Task"}
                                </h4>
                                <span onClick={() => setShowForm(false)} className="close-icon">&times;</span>
                            </div>

                            {/* Hiển thị lỗi phản hồi trực quan cho người dùng */}
                            {error && <div className="alert alert-danger py-2 px-3 mb-3" style={{ fontSize: "14px" }}>{error}</div>}
                            
                            {/* Hiển thị thông báo thành công */}
                            {success && <div className="alert alert-success py-2 px-3 mb-3" style={{ fontSize: "14px" }}>{success}</div>}

                            <form onSubmit={handleSubmit}>
                                <div className="mb-3">
                                    <label className="form-label text-muted fw-semibold" style={{ fontSize: "12px" }}>Task</label>
                                    <input 
                                        type="text" 
                                        className="form-control" 
                                        placeholder="Type your task here..." 
                                        value={title}
                                        onChange={(e) => setTitle(e.target.value)}
                                        style={{ borderRadius: "8px", padding: "10px 14px" }}
                                        autoFocus
                                    />
                                </div>

                                <div className="mb-4">
                                    <label className="form-label text-muted fw-semibold d-block" style={{ fontSize: "12px" }}>Priority</label>
                                    <div className="d-flex gap-2">
                                        {/* Nút chọn High */}
                                        <button 
                                            type="button" 
                                            onClick={() => setPriority("High")}
                                            className={`btn btn-priority-high ${priority === "High" ? "active" : ""}`}
                                        >
                                            High
                                        </button>
                                        {/* Nút chọn Medium */}
                                        <button 
                                            type="button" 
                                            onClick={() => setPriority("Medium")}
                                            className={`btn btn-priority-medium ${priority === "Medium" ? "active" : ""}`}
                                        >
                                            Medium
                                        </button>
                                        {/* Nút chọn Low */}
                                        <button 
                                            type="button" 
                                            onClick={() => setPriority("Low")}
                                            className={`btn btn-priority-low ${priority === "Low" ? "active" : ""}`}
                                        >
                                            Low
                                        </button>
                                    </div>
                                </div>

                                <div className="text-end">
                                    <button type="submit" className="btn btn-submit-task">
                                        {editingId !== null ? "Update" : "Add"}
                                    </button>
                                </div>
                            </form>
                        </div>
                    )}

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
